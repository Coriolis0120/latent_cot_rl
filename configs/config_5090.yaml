# Single RTX 5090 Training Config
# ========================================
# VRAM: 32GB GDDR7
# Architecture: Blackwell, ~21760 CUDA cores

# Model config
model:
  model_id: "openai-community/gpt2"
  local_path: "./models/gpt2"

# COCONUT params
coconut:
  c_thought: 1
  max_latent_stage: 4
  epochs_per_stage: 3
  pad_latent_to_max: true
  reset_optimizer: true     # Reset optimizer when stage changes
  uniform_prob: 0.0         # Probability of random stage sampling (0=always use scheduled stage)
  no_cot: false             # If true, skip all CoT steps

# Training params (optimized for 32GB VRAM)
training:
  batch_size: 16
  gradient_accumulation_steps: 2
  num_epochs: 15
  lr: 0.0001
  weight_decay: 0.01

# Data config
data:
  train_path: "data/train.json"
  val_path: "data/val.json"
  max_train_samples: 5000
  max_val_samples: 500

# Eval config
evaluation:
  eval_every: 2
  save_best_only: true

# Misc
misc:
  seed: 42
  save_path: "./checkpoints"
  use_wandb: false
  debug: false
